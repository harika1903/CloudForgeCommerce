name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # -------------------- BUILD & TEST --------------------
  build:
    name: Build & Test Services
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install user-service
        working-directory: user-service
        run: |
          npm install
          echo "No tests yet"

      - name: Install product-service
        working-directory: product-service
        run: |
          npm install
          echo "No tests yet"

      - name: Install order-service
        working-directory: order-service
        run: |
          npm install
          echo "No tests yet"

      - name: Install payment-service
        working-directory: payment-service
        run: |
          npm install
          echo "No tests yet"

      - name: Install notification-service
        working-directory: notification-service
        run: |
          npm install
          echo "No tests yet"

  # -------------------- DOCKER BUILD --------------------
  docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push user-service
        uses: docker/build-push-action@v5
        with:
          context: ./user-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/cloudforgecommerce-user-service:latest

      - name: Build & push product-service
        uses: docker/build-push-action@v5
        with:
          context: ./product-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/cloudforgecommerce-product-service:latest

      - name: Build & push order-service
        uses: docker/build-push-action@v5
        with:
          context: ./order-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/cloudforgecommerce-order-service:latest

      - name: Build & push payment-service
        uses: docker/build-push-action@v5
        with:
          context: ./payment-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/cloudforgecommerce-payment-service:latest

      - name: Build & push notification-service
        uses: docker/build-push-action@v5
        with:
          context: ./notification-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/cloudforgecommerce-notification-service:latest

  # -------------------- DEPLOY TO RAILWAY --------------------
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy user-service
        run: railway up --service user-service --project ${{ secrets.RAILWAY_PROJECT_ID }} --environment production --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy product-service
        run: railway up --service product-service --project ${{ secrets.RAILWAY_PROJECT_ID }} --environment production --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy order-service
        run: railway up --service order-service --project ${{ secrets.RAILWAY_PROJECT_ID }} --environment production --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy payment-service
        run: railway up --service payment-service --project ${{ secrets.RAILWAY_PROJECT_ID }} --environment production --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy notification-service
        run: railway up --service notification-service --project ${{ secrets.RAILWAY_PROJECT_ID }} --environment production --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}